name: Build & deploy Pulse to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'   # every ~10 min (GitHub min is 5; schedules can lag)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Generate live pulse.json
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
          AMP_SECRET_KEY: ${{ secrets.AMP_SECRET_KEY }}
          AMP_CONTENT_CHART_ID: ${{ secrets.AMP_CONTENT_CHART_ID }}
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
          CLICKHOUSE_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
        run: node scripts/generate.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deploy
        uses: actions/deploy-pages@v4
